apiVersion: batch/v1
kind: CronJob
metadata:
  name: onepiece-scraper
spec:
  schedule: "*/55 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: onepiece-scraper
        spec:
          restartPolicy: Never
          containers:
            - name: scraper
              image: onepiece-scraper:latest
              env:
                - name: DATABASE_URL
                  value: postgres://onepiece:onepiece@postgres-onepiece:5432/onepiece
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
