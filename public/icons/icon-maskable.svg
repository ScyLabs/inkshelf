<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="page-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="page-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e4e4e7"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Open book / manga - left page (scaled to safe zone ~80%) -->
  <path d="M256 175 C235 171, 170 165, 145 171 L145 330 C170 324, 235 327, 256 334 Z"
        fill="url(#page-left)" opacity="0.95"/>

  <!-- Open book / manga - right page -->
  <path d="M256 175 C277 171, 342 165, 367 171 L367 330 C342 324, 277 327, 256 334 Z"
        fill="url(#page-right)" opacity="0.95"/>

  <!-- Book spine shadow -->
  <path d="M253 173 L253 334 L259 334 L259 173 Z" fill="#a1a1aa" opacity="0.3"/>

  <!-- Manga panel lines on left page -->
  <line x1="160" y1="197" x2="246" y2="196" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="222" x2="246" y2="221" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="247" x2="246" y2="246" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="272" x2="246" y2="271" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="297" x2="246" y2="296" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>

  <!-- Manga panel lines on right page -->
  <line x1="266" y1="196" x2="354" y2="197" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="266" y1="221" x2="354" y2="222" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="266" y1="246" x2="354" y2="247" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="266" y1="271" x2="354" y2="272" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="266" y1="296" x2="354" y2="297" stroke="#a1a1aa" stroke-width="1.5" opacity="0.4"/>

  <!-- Orange bookmark ribbon -->
  <path d="M305 164 L305 218 L318 205 L331 218 L331 164 Z" fill="url(#accent)" opacity="0.95"/>

  <!-- "MR" text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="52" fill="#f97316" letter-spacing="5">MR</text>
</svg>
